<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITAR Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0f16;
      --bg-panel: #111823;
      --gold: #d4af37;
      --gold-dim: rgba(212, 175, 55, 0.2);
      --cream: #f3ecdd;
      --cream-dim: rgba(243, 236, 221, 0.6);
      --line: rgba(255, 255, 255, 0.1);
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: var(--cream);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: var(--bg-panel);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 32px;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--cream-dim);
      margin-bottom: 32px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--cream);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      margin-bottom: 24px;
      box-sizing: border-box;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
    }
    input[type="password"]:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.08);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--gold-dim);
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">SITAR</div>
    <div class="subtitle">Admin Portal</div>
    
    <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-login" id="btn-login">AUTHENTICATE</button>
    <div id="error-msg">Invalid passcode. Access Denied.</div>
  </div>

  <script>
    document.getElementById('btn-login').addEventListener('click', async (e) => {
      const btn = e.target;
      const pwd = document.getElementById('admin-password').value;
      const errorEl = document.getElementById('error-msg');
      
      if (!pwd) return;

      btn.disabled = true;
      btn.textContent = 'VERIFYING...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        
        if (res.ok) {
          window.location.href = '/admin.html';
        } else {
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'AUTHENTICATE';
        }
      } catch (err) {
        errorEl.textContent = 'Connection Error';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'AUTHENTICATE';
      }
    });

    document.getElementById('admin-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  </script>
</body>
</html>
