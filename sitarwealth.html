<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Site</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #F4F1EA;          /* warm cream background, like this chat's UI */
    --ink: #2B2926;          /* near-black text */
    --muted: #6E6A62;        /* secondary text */
    --accent: #B45309;       /* rust/amber accent for CTAs — swap for your brand color */
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Header / logo area ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 6vw;
    flex-shrink: 0;
    animation: riseIn 0.7s ease-out both;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-slot {
    /* Drop your logo <img> in here. Sized box keeps layout stable while you add it. */
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .logo-slot img { 
    max-width: 100%; 
    max-height: 100%; 
    object-fit: contain; 
    filter: brightness(1.35) contrast(1.2) drop-shadow(0 2px 10px rgba(201, 160, 74, 0.35));
    transition: filter 0.3s ease, transform 0.3s ease;
  }
  .logo-slot img:hover {
    filter: brightness(1.5) contrast(1.25) drop-shadow(0 4px 18px rgba(201, 160, 74, 0.6));
    transform: scale(1.05);
  }

  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.01em;
    color: var(--ink);
    white-space: nowrap;
  }

  nav { display: flex; gap: 24px; align-items: center; }
  nav a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    opacity: 0.85;
    transition: opacity 0.2s ease;
  }
  nav a:hover { opacity: 1; }

  /* ---------- Main / hero canvas ---------- */
  main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 6vw;
    gap: 4px;
  }

  .hero-text {
    max-width: 640px;
    margin-top: -4vh;
    animation: riseIn 0.8s ease-out 0.05s both;
  }
  .hero-text h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-style: normal;
    font-size: clamp(1.8rem, 4vw, 2.75rem);
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .hero-text p {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-style: normal;
    font-size: clamp(0.9rem, 1.8vw, 1.1rem);
    line-height: 1.5;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .hero-image-slot {
    width: min(100%, 576px);
    max-height: 47vh;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: imageAppear 0.9s ease-out 0.15s both;
  }
  .hero-image-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 12px 28px rgba(0,0,0,0.1));
    image-rendering: -webkit-optimize-contrast;
    transform: translateZ(0);
    backface-visibility: hidden;
  }

  .cta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: riseIn 0.8s ease-out 0.3s both;
  }

  .btn {
    padding: 14px 30px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .timer-icon-outside {
    height: 104px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
  }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--ink);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    padding: 10px;
    flex-shrink: 0;
    font-size: 0.75rem;
    color: var(--muted);
    animation: riseIn 0.8s ease-out 0.4s both;
  }

  /* ---------- Bottom-up load animation ---------- */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes imageAppear {
    from { opacity: 0; transform: translateY(24px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    header, .hero-image-slot, .cta-row, footer { animation: none; }
  }

  /* ---------- Mobile Menu Toggle ---------- */
  .mobile-toggle {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 26px;
    height: 19px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    z-index: 100;
  }
  .mobile-toggle span {
    width: 100%;
    height: 2.5px;
    background: var(--ink);
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .mobile-toggle.active span:nth-child(1) {
    transform: translateY(8.2px) rotate(45deg);
  }
  .mobile-toggle.active span:nth-child(2) {
    opacity: 0;
  }
  .mobile-toggle.active span:nth-child(3) {
    transform: translateY(-8.2px) rotate(-45deg);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    header {
      position: relative;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 10px 6vw;
    }
    .brand-name { font-size: 1.05rem; }
    
    .mobile-toggle {
      display: flex;
    }
    
    nav.nav-links {
      display: none;
      flex-direction: column;
      position: absolute;
      top: calc(100% + 4px);
      right: 6vw;
      left: auto;
      width: 210px;
      background: #FFFFFF;
      padding: 14px 18px;
      gap: 8px;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.08);
      z-index: 99;
      align-items: flex-start;
    }
    nav.nav-links.active {
      display: flex;
      animation: riseIn 0.25s ease-out both;
    }
    nav.nav-links a {
      font-size: 0.92rem;
      padding: 6px 0;
      width: 100%;
      border-bottom: 1px solid #f4f2ee;
    }
    nav.nav-links a:last-child {
      border-bottom: none;
    }

    main {
      justify-content: flex-start;
      padding-top: max(4px, 1vh);
      gap: 4px;
    }
    .hero-text {
      margin-top: 0;
      transform: translateY(-2px);
    }
    .hero-image-slot { width: min(90vw, 378px); max-height: 36vh; }
    .timer-icon-outside { height: 84px; }
    .btn { padding: 10px 22px; font-size: 0.85rem; }
    footer { font-size: 0.65rem; padding: 6px; }
  }
</style>
</head>
