<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Villa Walkthrough Video-Slideshow Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400;1,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12100D;
    --cream: #F3ECDD;
    --gold: #E6C37C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Work Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slideshow-container {
    position: relative;
    width: 90vw;
    height: 80vh;
    max-width: 1200px;
    max-height: 675px; /* 16:9 aspect ratio */
    border: 1px solid rgba(243,236,221,0.15);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }

  .slides-wrapper {
    position: absolute;
    inset: 0;
    background: #000;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    background-size: cover;
    background-position: center;
    animation: none; /* controlled via custom keyframes */
  }

  /* Ken Burns + Crossfade Animation */
  .slide:nth-child(1) {
    background-image: url('np.webp');
    animation: slide1 24s infinite linear;
  }
  .slide:nth-child(2) {
    background-image: url('villa_exterior_1783620295618.png');
    animation: slide2 24s infinite linear;
  }
  .slide:nth-child(3) {
    background-image: url('villa_interior_1783620312041.png');
    animation: slide3 24s infinite linear;
  }
  .slide:nth-child(4) {
    background-image: url('villa_amenity_1783620327692.png');
    animation: slide4 24s infinite linear;
  }

  @keyframes slide1 {
    0% { opacity: 0; transform: scale(1.0) translate(0, 0); }
    4% { opacity: 1; }
    21% { opacity: 1; transform: scale(1.08) translate(1%, -0.5%); }
    25% { opacity: 0; transform: scale(1.1) translate(1.5%, -0.8%); }
    96% { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes slide2 {
    0%, 21% { opacity: 0; transform: scale(1.1) translate(1%, -1%); }
    25% { opacity: 1; }
    46% { opacity: 1; transform: scale(1.0) translate(0, 0); }
    50% { opacity: 0; transform: scale(0.98) translate(-0.5%, 0.5%); }
    100% { opacity: 0; }
  }
  @keyframes slide3 {
    0%, 46% { opacity: 0; transform: scale(1.0) translate(0, 0); }
    50% { opacity: 1; }
    71% { opacity: 1; transform: scale(1.1) translate(-1%, 1%); }
    75% { opacity: 0; transform: scale(1.12) translate(-1.5%, 1.5%); }
    100% { opacity: 0; }
  }
  @keyframes slide4 {
    0%, 71% { opacity: 0; transform: scale(1.0) translate(0, -1%); }
    75% { opacity: 1; }
    96% { opacity: 1; transform: scale(1.1) translate(0, 0.5%); }
    100% { opacity: 0; transform: scale(1.1) translate(0, 1%); }
  }

  /* Overlay text labels */
  .slide-caption-wrapper {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(18,16,13,0.95) 0%, rgba(18,16,13,0.7) 60%, transparent 100%);
    padding: 40px 30px 30px;
    z-index: 5;
    pointer-events: none;
  }

  .cta-button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    background: var(--gold);
    color: #12100D;
    border: 1px solid var(--gold);
    padding: 12px 24px;
    border-radius: 2px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s ease;
    margin-top: 10px;
    display: inline-block;
  }
  .cta-button:hover {
    background: #f0d190;
    border-color: #f0d190;
    transform: translateY(-1px);
  }

  .back-link {
    position: absolute;
    top: 20px;
    left: 20px;
    color: var(--gold);
    text-decoration: none;
    font-size: 13px;
    border: 1px solid rgba(230,195,124,0.3);
    padding: 8px 16px;
    border-radius: 2px;
    background: rgba(18,16,13,0.6);
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    z-index: 10;
  }
  .back-link:hover {
    background: var(--gold);
    color: #12100D;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">← Back to website</a>

<div class="slideshow-container">
  <div class="slides-wrapper">
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
  </div>

  <div class="slide-caption-wrapper">
    <div style="position: absolute; bottom: 40px; left: 40px; right: 40px; z-index: 6; pointer-events: auto;">
      <h3 style="font-family: 'Fraunces', serif; font-style: italic; font-size: clamp(36px, 5vw, 54px); margin: 0 0 20px; color: var(--gold); text-shadow: 0 2px 12px rgba(0,0,0,0.9); font-weight: 500;">Luxury villa projects</h3>
      <button class="cta-button" onclick="location.href='index.html'">Invest in Villa Projects</button>
    </div>
  </div>
</div>

</body>
</html>
