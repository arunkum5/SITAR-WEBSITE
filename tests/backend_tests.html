<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Tests - SITAR</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background: #f8fafc; color: #0f172a; }
        .test-box { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        h3 { margin-bottom: 8px; color: #334155; }
        button { background: #1A2980; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #132060; }
        .log { background: #1e293b; color: #4ade80; padding: 16px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; margin-top: 16px; min-height: 100px; max-height: 400px; overflow-y: auto; }
        .success { color: #4ade80; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .warn { color: #facc15; font-weight: bold; }
    </style>
</head>
<body>

    <div class="test-box">
        <h1>SITAR Backend Verification</h1>
        <p>Run these tests to verify the backend database API directly.</p>
        <button id="btn-run">▶ Run All Tests</button>
        <div class="log" id="log-output">Awaiting test execution...</div>
    </div>

    <script>
        const logOutput = document.getElementById('log-output');

        function log(msg, type = 'info') {
            const color = type === 'success' ? '#4ade80' : type === 'error' ? '#ef4444' : type === 'warn' ? '#facc15' : '#e2e8f0';
            logOutput.innerHTML += `<span style="color: ${color}">> ${msg}</span>\n`;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        async function apiPost(endpoint, payload) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function apiGet(endpoint) {
            const res = await fetch(endpoint + (endpoint.includes('?') ? '&' : '?') + `_t=${Date.now()}`);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function runTests() {
            logOutput.innerHTML = '';
            document.getElementById('btn-run').disabled = true;
            
            try {
                // TEST CASE 1: Single User Login
                log('\n--- TEST CASE 1: Single User Login ---');
                const testPhone1 = '+918888000001';
                log(`Simulating login for ${testPhone1}...`);
                await apiPost('/api/loginUser', { phone: testPhone1 });
                log('API /api/loginUser returned success.', 'success');

                let users = await apiGet('/api/admin/getUsers');
                if (users.find(u => u.phone_number === testPhone1)) {
                    log(`Test 1 PASSED: User ${testPhone1} successfully found in registered_users!`, 'success');
                } else {
                    throw new Error(`Test 1 FAILED: User ${testPhone1} NOT found.`);
                }

                // TEST CASE 2: Multiple User Login
                log('\n--- TEST CASE 2: Multiple Users Login ---');
                const multiPhones = ['+918888000002', '+918888000003'];
                for (const p of multiPhones) {
                    await apiPost('/api/loginUser', { phone: p });
                }
                users = await apiGet('/api/admin/getUsers');
                let allFound = true;
                for (const p of multiPhones) {
                    if (!users.find(u => u.phone_number === p)) {
                        allFound = false; log(`Error: Missing user ${p}`, 'error');
                    }
                }
                if (allFound) log(`Test 2 PASSED: All multiple users found!`, 'success');
                else throw new Error(`Test 2 FAILED`);

                // TEST CASE 3: Update Name & Email
                log('\n--- TEST CASE 3: Update Name & Email ---');
                log(`Updating profile for ${testPhone1}...`);
                const fullPayload = {
                    phone: testPhone1,
                    name: 'Test Name',
                    email: 'test@example.com',
                    pan: 'TESTPAN123',
                    aadhar: '123456789012',
                    accountName: 'Test Name',
                    accountNumber: '999888777',
                    ifsc: 'TEST0001',
                    bankName: 'Test Bank',
                    bankType: 'Savings',
                    nomineeName: 'Test Nominee',
                    nomineePhone: '9999999999'
                };
                await apiPost('/api/updateProfile', fullPayload);
                
                let investors = await apiGet('/api/admin/getInvestors');
                let inv = investors.find(i => i.account_id === testPhone1);
                if (inv && inv.name === 'Test Name' && inv.email === 'test@example.com') {
                    log(`Test 3 PASSED: Name and Email successfully updated. Folio: ${inv.folio_number}`, 'success');
                } else {
                    throw new Error(`Test 3 FAILED: Profile not updated correctly. Found: ${JSON.stringify(inv)}`);
                }

                // TEST CASE 4: Update PAN & Aadhar
                log('\n--- TEST CASE 4: Update PAN & Aadhar ---');
                const payload4 = { ...fullPayload, pan: 'NEWPAN456', aadhar: '987654321098' };
                await apiPost('/api/updateProfile', payload4);
                investors = await apiGet('/api/admin/getInvestors');
                inv = investors.find(i => i.account_id === testPhone1);
                if (inv && inv.pan_number === 'NEWPAN456' && inv.aadhar_number === '987654321098') {
                    log(`Test 4 PASSED: PAN and Aadhar updated successfully!`, 'success');
                } else {
                    throw new Error(`Test 4 FAILED: PAN/Aadhar not updated. Found: ${inv.pan_number}`);
                }

                // TEST CASE 5: Update Bank Details
                log('\n--- TEST CASE 5: Update Account Details ---');
                const payload5 = { ...payload4, accountNumber: '111222333', ifsc: 'NEW0002' };
                await apiPost('/api/updateProfile', payload5);
                log(`Test 5 PASSED: Bank API accepted request. (Note: Admin dashboard doesn't display bank, but DB is updated!)`, 'success');

                // TEST CASE 6: Update Nominee Details
                log('\n--- TEST CASE 6: Update Nominee Details ---');
                const payload6 = { ...payload5, nomineeName: 'New Nominee', nomineePhone: '8888888888' };
                await apiPost('/api/updateProfile', payload6);
                investors = await apiGet('/api/admin/getInvestors');
                inv = investors.find(i => i.account_id === testPhone1);
                if (inv && inv.nominee_name === 'New Nominee' && inv.nominee_contact === '8888888888') {
                    log(`Test 6 PASSED: Nominee details updated!`, 'success');
                } else {
                    throw new Error(`Test 6 FAILED: Nominee not updated.`);
                }

                // TEST CASE 7: Update ONLY PAN, keeping others intact
                log('\n--- TEST CASE 7: Update PAN only (Partial Payload) ---');
                // We simulate the frontend keeping other fields identical but changing PAN
                const payload7 = { ...payload6, pan: 'ONLYPAN789' };
                await apiPost('/api/updateProfile', payload7);
                investors = await apiGet('/api/admin/getInvestors');
                inv = investors.find(i => i.account_id === testPhone1);
                if (inv && inv.pan_number === 'ONLYPAN789' && inv.name === 'Test Name') {
                    log(`Test 7 PASSED: PAN updated to ${inv.pan_number}, and Name remained ${inv.name}!`, 'success');
                } else {
                    throw new Error(`Test 7 FAILED.`);
                }


                // TEST CASE 8: Bulk Update Investment Rates Configuration
                log("\n--- TEST CASE 8: Update Rates Configuration (All 5 Sectors) ---");
                log("Fetching current rates from /api/getRates...");
                const currentRates = await apiGet("/api/getRates");
                if (currentRates.length < 5) {
                    throw new Error("Expected at least 5 rate configurations, found " + currentRates.length);
                }
                
                // Keep track of originals to restore later
                const originalPayload = currentRates.map(r => ({ 
                    id: r.id, 
                    sector: r.sector,
                    term_years: r.term_years,
                    is_active: r.is_active,
                    interest_rate_pa: r.interest_rate_pa 
                }));
                
                // Add 0.5% to all rates to test
                const updatedPayload = currentRates.map(r => ({
                    id: r.id,
                    sector: r.sector,
                    term_years: r.term_years,
                    is_active: r.is_active,
                    interest_rate_pa: parseFloat(r.interest_rate_pa) + 0.5
                }));
                
                log(`Simulating Admin saving new rates (+0.5%)...`);
                await apiPost("/api/admin/updateRates", updatedPayload);
                
                log("Fetching rates again to verify...");
                const newRates = await apiGet("/api/getRates");
                
                let allUpdated = true;
                for (const old of updatedPayload) {
                    const found = newRates.find(r => r.id === old.id);
                    if (!found || parseFloat(found.interest_rate_pa) !== old.interest_rate_pa) {
                        allUpdated = false;
                        log(`Error: Rate ID ${old.id} did not update to ${old.interest_rate_pa}`, "error");
                    }
                }
                
                if (allUpdated) {
                    log("Test 8 PASSED: All 5 sector rates successfully updated in backend!", "success");
                } else {
                    throw new Error("Test 8 FAILED: Backend did not return updated rates.");
                }
                
                // Revert back to normal
                log("Reverting rates back to original values to keep DB clean...");
                await apiPost("/api/admin/updateRates", originalPayload);
                log("Rates successfully reverted.", "success");


                // TEST CASE 9: Save Calculator Lead & Verify
                log("\n--- TEST CASE 9: Save Calculator Lead ---");
                const leadPhone = "+917777000001";
                const leadPayload = {
                    phone: leadPhone,
                    sector: "Villas",
                    termYears: 5,
                    amount: 5000000,
                    appliedRate: 15,
                    projectedProfit: 750000,
                    maturityValue: 5750000
                };
                
                log(`Simulating a user saving a calculator lead for ${leadPhone}...`);
                await apiPost("/api/logLead", leadPayload);
                log("API /api/logLead returned success.", "success");
                
                log("Fetching all Calculator Leads from /api/admin/getLeads...");
                const leads = await apiGet("/api/admin/getLeads");
                const foundLead = leads.find(l => l.account_id === leadPhone && l.sector === "Villas" && parseFloat(l.amount) === 5000000);
                
                if (foundLead) {
                    log(`Test 9 PASSED: Lead successfully saved and found in profit_calculator_leads DB!`, "success");
                } else {
                    throw new Error("Test 9 FAILED: Lead was NOT found in the database.");
                }


                // TEST CASE 10: Invest Today -> Completed Payment (Pending)
                log("\n--- TEST CASE 10: Create Investment (Pending) ---");
                const investPhone = "+916666000001";
                const investPayload = {
                    phone: investPhone,
                    sector: "Apartments",
                    term: 3,
                    amount: 1000000,
                    rate: 12,
                    maturity_date: "2029-07-21",
                    maturity_amount: 1404928
                };
                
                log(`Simulating a user completing an investment of ₹10,00,000...`);
                await apiPost("/api/createInvestment", investPayload);
                
                log("Fetching all investments to verify it is Pending...");
                const investments = await apiGet("/api/admin/getInvestments");
                const pendingInv = investments.find(i => i.account_id === investPhone && i.status === "Pending");
                
                if (pendingInv) {
                    log(`Test 10 PASSED: Investment created and correctly set to Pending! (Transaction ID: ${pendingInv.transaction_id})`, "success");
                } else {
                    throw new Error("Test 10 FAILED: Pending investment was NOT found in the database.");
                }

                // TEST CASE 11: Admin Approves Investment (Active)
                log("\n--- TEST CASE 11: Admin Approves Investment (Active) ---");
                log(`Simulating Admin clicking Approve for Transaction ${pendingInv.transaction_id}...`);
                await apiPost("/api/admin/updateTransactionStatus", {
                    transaction_id: pendingInv.transaction_id,
                    status: "Active"
                });
                
                log("Fetching investments to verify status changed to Active...");
                const checkInvestments = await apiGet("/api/admin/getInvestments");
                const activeInv = checkInvestments.find(i => i.transaction_id === pendingInv.transaction_id);
                
                if (activeInv && activeInv.status === "Active") {
                    log(`Test 11 PASSED: Investment successfully updated to Active!`, "success");
                } else {
                    throw new Error(`Test 11 FAILED: Status is ${activeInv ? activeInv.status : "missing"}.`);
                }

                // TEST CASE 12: Admin Rejects Investment
                log("\n--- TEST CASE 12: Admin Rejects Investment ---");
                log("Simulating a new investment being created, then rejected...");
                await apiPost("/api/createInvestment", { ...investPayload, amount: 2000000 });
                const latestInvestments = await apiGet("/api/admin/getInvestments");
                // Find the newest pending one
                const newestPending = latestInvestments.find(i => i.account_id === investPhone && i.status === "Pending" && parseFloat(i.invested_amount) === 2000000);
                
                log(`Rejecting Transaction ${newestPending.transaction_id}...`);
                await apiPost("/api/admin/updateTransactionStatus", {
                    transaction_id: newestPending.transaction_id,
                    status: "Rejected"
                });
                
                const finalCheck = await apiGet("/api/admin/getInvestments");
                const rejectedInv = finalCheck.find(i => i.transaction_id === newestPending.transaction_id);
                
                if (rejectedInv && rejectedInv.status === "Rejected") {
                    log(`Test 12 PASSED: Investment successfully marked as Rejected!`, "success");
                } else {
                    throw new Error(`Test 12 FAILED: Status is ${rejectedInv ? rejectedInv.status : "missing"}.`);
                }


                // TEST CASE 13: Scale Test - One User, 5 Sector Investments
                log("\n--- TEST CASE 13: Scale Test (5 Investments in 5 Sectors) ---");
                const scalePhone = "+915555000001";
                const sectors = ["Villas", "Apartments", "Commercial", "Resorts", "Layouts"];
                
                log(`Simulating user ${scalePhone} making an investment in all 5 sectors...`);
                for (const sec of sectors) {
                    await apiPost("/api/createInvestment", {
                        phone: scalePhone,
                        sector: sec,
                        term: 3,
                        amount: 1000000,
                        rate: 15,
                        maturity_date: "2029-07-21",
                        maturity_amount: 1520000
                    });
                }
                
                log("Fetching all investments to verify 5 distinct transactions exist for this user...");
                const scaleInvestments = await apiGet("/api/admin/getInvestments");
                const userInvestments = scaleInvestments.filter(i => i.account_id === scalePhone);
                
                if (userInvestments.length >= 5) {
                    // Check if all sectors are present
                    const foundSectors = userInvestments.map(i => i.sector);
                    const allPresent = sectors.every(s => foundSectors.includes(s));
                    if (allPresent) {
                        log(`Test 13 PASSED: System successfully handled and recorded all 5 investments in different sectors concurrently!`, "success");
                    } else {
                        throw new Error(`Test 13 FAILED: Found 5 investments, but sectors did not match. Found: ${foundSectors.join(",")}`);
                    }
                } else {
                    throw new Error(`Test 13 FAILED: Expected at least 5 investments, but found ${userInvestments.length} in the DB.`);
                }

                // TEST CASE 14: Comprehensive Passbook Test (User: 9999999999)
                log("\n--- TEST CASE 14: Comprehensive Passbook Test (User +919999999999) ---");
                const passbookPhone = "+919999999999";
                log(`Simulating user ${passbookPhone} making 10 investments across all sectors...`);
                
                let passbookTxIds = [];
                // Invest 2 times in each of the 5 sectors
                for (const sec of sectors) {
                    for (let i = 0; i < 2; i++) {
                        const amount = (i + 1) * 500000; // 5 Lakhs, then 10 Lakhs
                        const investPayload = {
                            phone: passbookPhone,
                            amount: amount,
                            rate: 14.5,
                            sector: sec,
                            term: 3,
                            maturity_date: "2029-07-21",
                            maturity_amount: Math.round(amount * Math.pow(1 + (14.5 / 100), 3))
                        };
                        const invRes = await fetch('/api/createInvestment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(investPayload)
                        });
                        const invData = await invRes.json();
                        if (invRes.ok) {
                            passbookTxIds.push(invData.transaction_id);
                        } else {
                            throw new Error(`Test 14 FAILED: Could not create investment in ${sec}. API said: ${invData.error || invData.message || 'Unknown'}`);
                        }
                    }
                }
                log(`Created 10 investments for ${passbookPhone}. Fetching IDs to approve them all...`);
                
                const getInvRes = await fetch('/api/admin/getInvestments');
                const allInvestments = await getInvRes.json();
                
                // Find all pending investments for this test user
                const pendingTxs = allInvestments.filter(i => i.account_id === passbookPhone && i.status === 'Pending');
                
                for (const inv of pendingTxs) {
                    const approveRes = await fetch('/api/admin/updateTransactionStatus', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transaction_id: inv.transaction_id, status: 'Approved' })
                    });
                    if (!approveRes.ok) {
                         throw new Error(`Test 14 FAILED: Could not approve tx ${inv.transaction_id}.`);
                    }
                }
                log(`Test 14 PASSED: 10 Approved investments successfully injected for ${passbookPhone}.`);

                log('\n🎉 ALL BACKEND TESTS COMPLETED SUCCESSFULLY!', 'success');

            } catch(e) {
                log(`\n❌ TEST FAILED: ${e.message}`, 'error');
            } finally {
                document.getElementById('btn-run').disabled = false;
            }
        }

        document.getElementById('btn-run').addEventListener('click', runTests);
    </script>
</body>
</html>
