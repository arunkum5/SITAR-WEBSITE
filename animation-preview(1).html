<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Animation Preview</title>
<style>
  :root{
    --navy:#1c2b3a;
    --paper:#f6f2e8;
    --line:#3c5066;
    --gold:#a9792c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:var(--paper); color:#1c2b3a; padding:30px 20px;
  }
  h1{ font-size:20px; margin-bottom:4px; text-align:center; }
  p.sub{ color:#6b6358; font-size:13px; margin-top:0; margin-bottom:30px; text-align:center; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:24px; max-width:900px; margin:0 auto; }
  .card{ background:#fff; border:1px solid #ddd4bd; border-radius:10px; padding:18px; text-align:center; }
  .card h3{ font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:#6b6358; margin:0 0 14px; font-weight:600; }

  .stage{
    background:var(--navy); border-radius:8px; padding:40px;
    display:flex; align-items:center; justify-content:center;
    height:260px; position:relative; overflow:hidden;
  }

  .replay{
    margin-top:14px; background:var(--gold); color:#fff; border:0; padding:8px 16px;
    border-radius:6px; font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .replay:hover{ background:#7c581d; }

  /* ---- Animation 1: Scale up from a point ---- */
  .scale-logo{
    width:150px; height:150px;
    transform: scale(0);
    opacity: 0;
    animation: scaleReveal 1.4s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes scaleReveal{
    0%   { transform: scale(0);   opacity: 0; }
    60%  { transform: scale(1.08);opacity: 1; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* ---- Animation 2: Wipe / clip reveal (circular) ---- */
  .wipe-logo{
    width:150px; height:150px;
    clip-path: circle(0% at 50% 50%);
    animation: wipeReveal 1.6s ease-out forwards;
  }
  @keyframes wipeReveal{
    0%   { clip-path: circle(0% at 50% 50%); }
    100% { clip-path: circle(75% at 50% 50%); }
  }

  .static-logo{ width:260px; max-width:90%; height:auto; }

  footer{ text-align:center; font-size:11px; color:#555; margin-top:30px; }
</style>
</head>
<body>

<h1>Logo Reveal Animations</h1>
<p class="sub">Two approaches, both on your navy background. Click "Replay" to watch again.</p>

<div class="grid">

  <div class="card">
    <h3>1 — Scale Up From a Point</h3>
    <div class="stage">
      <img class="scale-logo" id="scaleLogo" src="nlogo.svg" alt="logo">
    </div>
    <button class="replay" onclick="replay('scaleLogo','scale-logo')">↺ Replay</button>
  </div>

  <div class="card">
    <h3>2 — Circular Wipe Reveal</h3>
    <div class="stage">
      <img class="wipe-logo" id="wipeLogo" src="nlogo.svg" alt="logo">
    </div>
    <button class="replay" onclick="replay('wipeLogo','wipe-logo')">↺ Replay</button>
  </div>

  <div class="card">
    <h3>3 — Text Logo (Static)</h3>
    <div class="stage">
      <img class="static-logo" src="log-text.svg" alt="text logo">
    </div>
  </div>

</div>

<footer>Local preview — open this file directly in your browser. Logo.svg must stay in the same folder.</footer>

<script>
function replay(id, className){
  const el = document.getElementById(id);
  el.classList.remove(className);
  void el.offsetWidth; // force reflow to restart animation
  el.classList.add(className);
}
</script>

</body>
</html>
